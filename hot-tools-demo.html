<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Tools - Showcase</title>
    <!-- Template Styles for theme buttons if needed -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
        }

        /* --- Section Layout --- */
        .showcase-section {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-header h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #061C3D;
            margin-bottom: 12px;
        }

        .section-header p {
            color: #666;
            font-size: 1.1rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        /* --- Custom Dark Neon Cards for Trending Tools --- */
        .tt-product-card {
            background: linear-gradient(145deg, #1f1f23 0%, #151518 100%);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-decoration: none;
            overflow: hidden;
            z-index: 1;
        }

        /* Neon glow effect on hover */
        .tt-product-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #FF3838, transparent 40%, transparent 60%, #FF3838);
            z-index: -1;
            border-radius: 18px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .tt-product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(255, 56, 56, 0.2);
        }

        .tt-product-card:hover::before {
            opacity: 1;
        }

        /* Top Section: Icon & Orders Badge */
        .tt-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .tt-card-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 10px rgba(255,255,255,0.03);
            flex-shrink: 0;
        }

        .tt-card-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .tt-card-orders {
            background: rgba(255, 56, 56, 0.15);
            color: #FF3838;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 56, 56, 0.3);
            white-space: nowrap;
        }

        /* Content */
        .tt-card-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .tt-card-title {
            font-size: 1.25rem;
            color: #fff;
            margin: 0 0 16px 0;
            font-weight: 700;
            line-height: 1.3;
        }

        .tt-card-price-action {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
        }

        .tt-card-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
        }

        /* Buy Action Container */
        .tt-buy-now-wrapper {
            margin-top: 5px;
        }

        /* Ensure it picks up theme styling, fallback included */
        .thm-btn.tt-btn-custom {
            width: 100%;
            text-align: center;
            display: block;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            box-sizing: border-box;
            background-color: #FF3838;
            color: #fff;
            border: none;
            transition: all 0.3s ease;
        }

        .thm-btn.tt-btn-custom:hover {
            background-color: #061C3D;
            color: #fff;
        }
    </style>
</head>
<body>

    <section class="showcase-section">
        <div class="section-header">
            <h2>🔥 Most Selling Tools</h2>
            <p>Our top-rated premium digital subscriptions chosen by professionals.</p>
        </div>

        <div class="product-grid" id="productGrid">
            <!-- Cards Injected via JS -->
        </div>
    </section>

    <script>
        // Use EXACT required tools and stats 
        const products = [
            {
                id: 1,
                title: "ChatGPT Semi",
                price: "PKR 1000",
                orders: "350+",
                image: "https://www.google.com/s2/favicons?domain=chatgpt.com&sz=128",
            },
            {
                id: 2,
                title: "ChatGPT Private",
                price: "PKR 25000",
                orders: "75+",
                image: "https://www.google.com/s2/favicons?domain=chatgpt.com&sz=128",
            },
            {
                id: 3,
                title: "Capcut Private",
                price: "PKR 5000",
                orders: "500+",
                image: "https://www.google.com/s2/favicons?domain=capcut.com&sz=128",
            },
            {
                id: 4,
                title: "Envato Elements",
                price: "PKR 700",
                orders: "750+",
                image: "https://www.google.com/s2/favicons?domain=envato.com&sz=128",
            },
            {
                id: 5,
                title: "Netflix Premium",
                price: "PKR 300",
                orders: "1000+",
                image: "https://www.google.com/s2/favicons?domain=netflix.com&sz=128",
            }
        ];

        const grid = document.getElementById('productGrid');
        
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'tt-product-card';

            const whatsappMessage = encodeURIComponent(\`Hi! I'm interested in \${product.title}\`);
            const checkoutUrl = \`https://wa.me/923268600994?text=\${whatsappMessage}\`;

            card.innerHTML = \`
                <div class="tt-card-top">
                    <div class="tt-card-icon">
                        <img src="\${product.image}" loading="lazy" alt="\${product.title} logo">
                    </div>
                    <div class="tt-card-badges">
                        <span class="tt-card-orders"><i class="fas fa-shopping-cart"></i> \${product.orders} Sold</span>
                    </div>
                </div>
                <div class="tt-card-content">
                    <h3 class="tt-card-title">\${product.title}</h3>
                    <div class="tt-card-price-action">
                        <span class="tt-card-price">\${product.price}</span>
                        <div class="tt-buy-now-wrapper">
                            <a href="\${checkoutUrl}" target="_blank" class="thm-btn thm-btn-two tt-btn-custom">Buy Now</a>
                        </div>
                    </div>
                </div>
            \`;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
