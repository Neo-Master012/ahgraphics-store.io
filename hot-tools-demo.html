<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Tools - Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent-gradient: linear-gradient(135deg, #ff416c, #ff4b2b);
            --card-bg: #ffffff;
            --modal-overlay: rgba(15, 23, 42, 0.6);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-glow: 0 0 20px rgba(255, 75, 43, 0.4);
            --radius-md: 12px;
            --radius-lg: 20px;
            --font-main: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        /* --- Section Layout --- */
        .showcase-section {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-header h2 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .section-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        /* --- Product Cards --- */
        .product-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-md);
            border: 1px solid rgba(0,0,0,0.05);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            border-color: transparent;
        }

        .card-image-wrapper {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: #e2e8f0;
        }

        .card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .card-image-wrapper img {
            transform: scale(1.05);
        }

        .badge-hot {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent-gradient);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 6px 12px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(255, 75, 43, 0.3);
            z-index: 2;
        }

        .card-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .card-description {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .card-action {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .product-card:hover .card-action {
            color: var(--primary-hover);
        }

        /* --- Modal Backdrop --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--modal-overlay);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* --- Modal Container --- */
        .modal-container {
            background: var(--card-bg);
            width: 90%;
            max-width: 900px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: row;
            transform: scale(0.95) translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh;
        }

        .modal-overlay.active .modal-container {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-image-col {
            flex: 1;
            background: #f1f5f9;
            position: relative;
            min-height: 300px;
        }

        .modal-image-col img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .modal-content-col {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .modal-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.05);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 10;
        }

        .modal-close-btn:hover {
            background: rgba(0,0,0,0.1);
        }

        .modal-close-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--text-main);
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--text-main);
            padding-right: 30px;
        }

        .modal-price {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .modal-desc {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 1rem;
            line-height: 1.7;
        }

        .modal-features {
            margin-bottom: 30px;
            list-style: none;
        }

        .modal-features li {
            position: relative;
            padding-left: 28px;
            margin-bottom: 12px;
            color: var(--text-main);
            font-weight: 500;
        }

        .modal-features li::before {
            content: "✓";
            position: absolute;
            left: 0;
            top: 0;
            color: #10b981;
            font-weight: 900;
            font-size: 1.1rem;
        }

        .modal-actions {
            margin-top: auto;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            font-family: var(--font-main);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            flex: 2;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: var(--text-main);
            flex: 1;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        /* --- Mobile Responsive (Bottom Sheet Modal) --- */
        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: 1fr;
            }

            .modal-container {
                flex-direction: column;
                width: 100%;
                max-width: none;
                margin-top: auto;
                border-radius: 24px 24px 0 0;
                transform: translateY(100%);
                max-height: 85vh;
            }

            .modal-overlay.active .modal-container {
                transform: translateY(0);
            }

            .modal-image-col {
                min-height: 220px;
                flex: none;
            }

            .modal-content-col {
                padding: 25px;
            }

            .modal-title {
                font-size: 1.6rem;
            }

            .modal-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <section class="showcase-section">
        <div class="section-header">
            <h2>🔥 Trending Tools</h2>
            <p>Our most popular solutions trusted by professionals.</p>
        </div>

        <div class="product-grid" id="productGrid">
            <!-- Cards will be injected by JavaScript -->
        </div>
    </section>

    <!-- Modal Markup -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-container">
            <div class="modal-image-col">
                <img id="modalImg" src="" alt="Product Cover">
            </div>
            <div class="modal-content-col">
                <button class="modal-close-btn" id="closeModal" aria-label="Close modal">
                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
                <h3 class="modal-title" id="modalTitle">Product Title</h3>
                <div class="modal-price" id="modalPrice">$0.00</div>
                <p class="modal-desc" id="modalDesc">Detailed product description goes here.</p>
                <ul class="modal-features" id="modalFeatures">
                    <!-- Features injected via JS -->
                </ul>
                <div class="modal-actions">
                    <button class="btn btn-primary" onclick="alert('Added to cart!')">Add to Cart</button>
                    <button class="btn btn-secondary" id="cancelModal">Later</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Product Data (Simulated Database) ---
        const products = [
            {
                id: 1,
                title: "NeuroEngine AI Core",
                shortDesc: "Next-gen machine learning framework for predictive insights.",
                longDesc: "NeuroEngine AI Core revolutionizes how you process big data. With out-of-the-box support for advanced neural networks and deep learning models, it accelerates your data science workflow. Perfect for rapid prototyping and enterprise scaling.",
                price: "$499.00",
                image: "https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=800&q=80",
                badge: "Hot",
                features: [
                    "Auto-scaling ML pipelines",
                    "Advanced natural language processing",
                    "Real-time data visualization",
                    "Enterprise-grade security"
                ]
            },
            {
                id: 2,
                title: "PixelForge Studio X",
                shortDesc: "The ultimate vector and raster graphic design suite.",
                longDesc: "Push the boundaries of digital art with PixelForge Studio X. Offering seamless integration between vector tools and high-res raster brushes. Experience zero-lag performance even with thousands of layers.",
                price: "$299.00",
                image: "https://images.unsplash.com/photo-1542744094-3a31f272c490?auto=format&fit=crop&w=800&q=80",
                badge: "Bestseller",
                features: [
                    "Infinite canvas technology",
                    "AI-assisted asset generation",
                    "Cloud-synced workspaces",
                    "One-click asset export"
                ]
            },
            {
                id: 3,
                title: "StreamNova Pro",
                shortDesc: "Broadcast-quality video rendering and distribution platform.",
                longDesc: "Take your content live with StreamNova Pro. Featuring ultra-low latency hardware encoding, multi-platform simulcasting, and dynamic overlays. Designed for professional creators and e-sport broadcasts.",
                price: "$149.00/mo",
                image: "https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=800&q=80",
                badge: "Trending",
                features: [
                    "4K 60FPS streaming capabilities",
                    "Multi-destination casting (Twitch, YT, etc.)",
                    "Real-time analytics dashboard",
                    "Automated VOD backups"
                ]
            },
            {
                id: 4,
                title: "CodeFlow Optimizer",
                shortDesc: "AI-driven code analysis and automated refactoring tool.",
                longDesc: "Eliminate technical debt instantly. CodeFlow continuously scans your repository to detect memory leaks, unoptimized loops, and anti-patterns, suggesting or automatically applying fixes via Pull Requests.",
                price: "$89.00",
                image: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=800&q=80",
                badge: "Sale",
                features: [
                    "Supports 20+ programming languages",
                    "Seamless CI/CD integration",
                    "Automated vulnerability patching",
                    "Custom rule definition engine"
                ]
            }
        ];

        // --- 2. Render Product Cards ---
        const grid = document.getElementById('productGrid');
        
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => openModal(product);

            card.innerHTML = `
                <div class="card-image-wrapper">
                    <span class="badge-hot">${product.badge}</span>
                    <img src="${product.image}" loading="lazy" alt="${product.title}">
                </div>
                <div class="card-content">
                    <h3 class="card-title">${product.title}</h3>
                    <p class="card-description">${product.shortDesc}</p>
                    <div class="card-footer">
                        <span class="card-price">${product.price}</span>
                        <span class="card-action">View details &xrarr;</span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        // --- 3. Modal Logic ---
        const modal = document.getElementById('productModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalPrice = document.getElementById('modalPrice');
        const modalDesc = document.getElementById('modalDesc');
        const modalImg = document.getElementById('modalImg');
        const modalFeatures = document.getElementById('modalFeatures');
        
        const closeBtn = document.getElementById('closeModal');
        const cancelBtn = document.getElementById('cancelModal');

        function openModal(data) {
            // Populate Modal
            modalTitle.textContent = data.title;
            modalPrice.textContent = data.price;
            modalDesc.textContent = data.longDesc;
            modalImg.src = data.image;
            modalImg.alt = data.title;
            
            // Populate features
            modalFeatures.innerHTML = '';
            data.features.forEach(feature => {
                const li = document.createElement('li');
                li.textContent = feature;
                modalFeatures.appendChild(li);
            });

            // Prevent scrolling on body
            document.body.style.overflow = 'hidden';
            
            // Show modal
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close Event Listeners
        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);
        
        // Close on overlay click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
